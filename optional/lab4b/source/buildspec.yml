version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies for compliance check"
      - pip install --quiet boto3
  build:
    commands:
      - echo "Banking ML CI/CD build — Lab 4b"
      - python compliance_check.py
      - echo '{"pipeline":"lab4b","compliance":"PASS"}' > build_output.json
artifacts:
  files:
    - build_output.json
    - compliance_result.json
  name: banking-ml-cicd-build-$CODEBUILD_BUILD_NUMBER
